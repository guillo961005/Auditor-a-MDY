// ── BUILD FLYER ──
function buildFlyer(f, opts = {}) {

  const pieText = f.pie !== undefined ? f.pie : '🤝 Sigamos trabajando juntos con <span>integridad y compromiso</span>. ¡Nuestra inocuidad es clave!';

  return `
  <div class="flyer" style="${zStyle}background:${cardBg};">
    <div class="flyer-header" style="background:linear-gradient(135deg,${t.hdrFrom},${t.hdrTo});">
      <div class="flyer-logo">🌿 <span>MESA DE YEGUAS</span> COUNTRY CLUB</div>
      <div class="day-badge">📅 DÍA ${f.dia} DE 30</div>
      <div class="week-tag">${semNames[f.sem]}</div>
    </div>
    <div class="bubble-zone">
      <div class="flyer-icon">${f.icon}</div>
      <div class="speech-bubble" style="background:${t.bblBg};">
        <div style="position:absolute;left:-10px;top:14px;border:10px solid transparent;border-right-color:${t.bblArrow};border-left:0;margin-top:-5px;"></div>
        <p>${f.burbuja}</p>
      </div>
    </div>
    <div class="title-banner" style="background:linear-gradient(135deg,${t.ttlFrom},${t.ttlTo});">
      <div class="label" style="color:${t.ttlTxt};opacity:0.65;">🍽️ TEMA DEL DÍA</div>
      <h2 style="color:${t.ttlTxt};">${f.tema}</h2>
    </div>
    <div class="mensaje-zone">
      <div class="msg-card" style="border-left:4px solid ${t.msgBd};">
        <div class="msg-label" style="color:${t.msgLbl};">💬 Mensaje central</div>
        <div class="msg-text">${f.mensaje}</div>
      </div>
    </div>
    <div class="puntos-zone">
      <div class="section-label" style="background:${t.secBg};">
        <span style="color:${t.secTxt};">✅ Puntos clave que debes saber</span>

// ── NAVIGATION ──
let current = 0;

function render() {
  document.getElementById('viewer').innerHTML = buildFlyer(flyers[current]);
  document.getElementById('counter').textContent = `${current+1} / 30`;
  document.getElementById('btnPrev').disabled = current === 0;
  document.getElementById('btnNext').disabled = current === flyers.length-1;
  document.getElementById('flyerSelect').value = current;
  window.scrollTo({top:0,behavior:'smooth'});
}

function navigate(dir) {
  current = Math.max(0,Math.min(flyers.length-1,current+dir));
  render();
}

function goTo(idx) { current = idx; render(); }

// ── PRINT ──

// Carta (Letter): 21.59 cm × 27.94 cm — 7 mm margen cada lado.
// calcPrintZoom recibe dimensiones YA medidas con estilos compactos → sin factor de corrección.
function calcPrintZoom(fw, fh) {
  const mmToPx = 96 / 25.4;
  const avW = (215.9 - 14) * mmToPx;   // 201.9 mm → ~763 px
  const avH = (279.4 - 14) * mmToPx;   // 265.4 mm → ~1003 px
  return Math.min(Math.max(Math.min(avW / (fw||420), avH / (fh||800)) * 0.93, 0.5), 2.0);
}

// Estilos compactos que se aplican en @media print — se inyectan también al medir
// para que el zoom sea calculado sobre la altura real de impresión (no la de pantalla).
const COMPACT_CSS = `
.print-measuring .flyer-header{padding:10px 18px 7px!important}
.print-measuring .bubble-zone{padding:0 16px 7px!important}
.print-measuring .flyer-icon{font-size:50px!important}
.print-measuring .speech-bubble{padding:10px 13px!important}
.print-measuring .speech-bubble p{font-size:12px!important;line-height:1.44!important}
.print-measuring .title-banner{padding:9px 18px!important}
.print-measuring .title-banner h2{font-size:16px!important}
.print-measuring .mensaje-zone{padding:8px 16px 5px!important}
.print-measuring .msg-card{padding:10px 13px!important}
.print-measuring .msg-text{font-size:12.5px!important;line-height:1.48!important}
.print-measuring .puntos-zone{padding:7px 16px 4px!important}
.print-measuring .section-label{padding:3px 11px!important;margin-bottom:7px!important}
.print-measuring .punto-item{padding:4px 0!important}
.print-measuring .punto-text{font-size:11.5px!important;line-height:1.44!important}
.print-measuring .regla-zone{padding:7px 16px 4px!important}
.print-measuring .regla-card{padding:10px 13px!important}
.print-measuring .regla-text{font-size:12px!important}
.print-measuring .reflexion-zone{padding:6px 16px 7px!important}
.print-measuring .ref-card{padding:10px 13px!important}
.print-measuring .ref-text{font-size:12px!important}
.print-measuring .norma-bar{padding:6px 16px!important}
.print-measuring .norma-text{font-size:9.5px!important}
.print-measuring .bottom-strip{padding:7px 16px!important}
.print-measuring .bottom-strip p{font-size:10.5px!important}
`;

function ensureCompactStyleTag() {
  if (!document.getElementById('print-compact-measure')) {
    const s = document.createElement('style');
    s.id = 'print-compact-measure';
    s.textContent = COMPACT_CSS;
    document.head.appendChild(s);
  }
}

// Individual zoom per poster — each poster fills the page optimally.
const printZooms = [];

function initPrintZoom() {
  ensureCompactStyleTag();
  const host = document.createElement('div');
  host.className = 'print-measuring';
  host.style.cssText = 'position:fixed;top:-99999px;left:0;width:420px;visibility:hidden;pointer-events:none;z-index:-1;';
  host.innerHTML = flyers.map(f => buildFlyer(f)).join('');
  document.body.appendChild(host);
  printZooms.length = 0;
  host.querySelectorAll('.flyer').forEach(el => {
    printZooms.push(calcPrintZoom(el.offsetWidth || 420, el.offsetHeight || 800));
  });
  document.body.removeChild(host);
  document.documentElement.style.setProperty('--print-zoom', (printZooms[0] || 1.4).toFixed(4));
}

function printCurrent() {
  document.getElementById('printAllContainer').innerHTML = '';
  document.documentElement.style.setProperty('--print-zoom', (printZooms[current] || 1.4).toFixed(4));
  document.body.classList.add('printing-single');
  document.body.classList.remove('printing-all');
  setTimeout(() => {
    window.print();
    window.addEventListener('afterprint', () => document.body.classList.remove('printing-single'), {once:true});
  }, 100);
}

function printAll() {
  const c = document.getElementById('printAllContainer');
  c.innerHTML = flyers.map((f, i) => {
    const z = (printZooms[i] || 1.4).toFixed(4);
    return `<div class="flyer-wrapper">${buildFlyer(f, {zoom: z})}</div>`;
  }).join('');
  document.body.classList.remove('printing-single');
  document.body.classList.add('printing-all');
  setTimeout(() => {
    window.print();
    window.addEventListener('afterprint', () => {
      document.body.classList.remove('printing-all');
      c.innerHTML = '';
    }, {once:true});
  }, 300);
}

const sel = document.getElementById('flyerSelect');
flyers.forEach((f,i) => {
  const o = document.createElement('option');

document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight'||e.key==='ArrowDown') navigate(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') navigate(-1);
});

render();
document.fonts.ready.then(initPrintZoom);

function dlHTML(content, filename) {
  const blob = new Blob([content], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

}
